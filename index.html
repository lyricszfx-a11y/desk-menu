<script>
const key = 'baronServiceRequests';
const menuKey = 'baronMenu';

const board = document.getElementById('board');
const doneBoard = document.getElementById('doneBoard');
const filter = document.getElementById('filter');

const SHEET_URL = "https://script.google.com/macros/s/AKfycbz6sDvkbl77tkeU2YuNrV-gk_VRm_zdAurbB_8x6vwhpVS0IQKrH23jM6LiuRWzqbghyg/exec";

/* =========================
   GOOGLE SHEETS SEND
========================= */
function sendToSheet(order){
  fetch(SHEET_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(order)
  })
  .then(r => r.text())
  .then(d => console.log("Sent:", d))
  .catch(e => console.log("Sheet error:", e));
}

/* =========================
   STORAGE
========================= */
function requests(){
  return JSON.parse(localStorage.getItem(key) || '[]');
}

function save(list){
  localStorage.setItem(key, JSON.stringify(list));
}

/* =========================
   SOUND SYSTEM
========================= */
let soundEnabled = false;
let audioCtx = null;

function enableSound(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    soundEnabled = true;
    alert("Sound Enabled");
  }catch(e){
    alert("Sound not supported");
  }
}

function playAlert(){
  if(!soundEnabled || !audioCtx) return;

  let now = audioCtx.currentTime;

  [0,0.2,0.4].forEach(offset=>{
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now + offset);

    gain.gain.setValueAtTime(0.0001, now + offset);
    gain.gain.exponentialRampToValueAtTime(0.2, now + offset + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.2);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now + offset);
    osc.stop(now + offset + 0.25);
  });
}

/* =========================
   CREATE REQUEST
========================= */
function createRequest(req){
  let list = requests();
  list.unshift(req);
  save(list);

  sendToSheet(req);
  playAlert();
  render();
}

/* =========================
   RENDER BOARD
========================= */
function render(){
  let list = requests();

  if(!board) return;

  board.innerHTML = list.length ? list.map(r => `
    <div class="ticket">
      <h3>${r.type}</h3>
      <p>${r.details?.message || ""}</p>
      <small>${r.time}</small>
    </div>
  `).join('') : "<p>No requests yet</p>";
}

/* =========================
   AUTO SYNC (IMPORTANT FIX)
========================= */
setInterval(render, 3000);

window.addEventListener('storage', (e)=>{
  if(e.key === key) render();
});

/* =========================
   BUTTONS
========================= */
document.getElementById('seed')?.addEventListener('click', ()=>{
  createRequest({
    id: "BRN-" + Date.now(),
    type: "Call Waiter",
    status: "New",
    time: new Date().toLocaleString(),
    details: {
      table: "Test 1",
      message: "Test request"
    }
  });
});

document.getElementById('enableSound')
?.addEventListener('click', enableSound);

/* =========================
   INITIAL LOAD
========================= */
render();
</script>
