<script>

const key='baronServiceRequests';
const menuKey='baronMenu';
const board=document.getElementById('board');
const doneBoard=document.getElementById('doneBoard');
const filter=document.getElementById('filter');
const channel=('BroadcastChannel' in window)?new BroadcastChannel('baron-service-desk'):null;

let soundEnabled=false;
let audioCtx=null;

/* =========================
   🔥 GOOGLE SHEET SUPPORT (ADDED)
========================= */
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwsjtb-jFaX8g-Etk2u9D_eYd1Y9ybNGcIK5gk0RrEf0jv20xZvwmMcmynkukae6gj2Kw/exec";

/* LOAD FROM GOOGLE SHEET (ADDED) */
async function loadFromSheet(){
  try{
    let res = await fetch(SHEET_URL);
    let data = await res.json();

    if(!Array.isArray(data)) return;

    // convert sheet rows → your system format
    let converted = data.map(row => ({
      id: row[0],
      type: row[1],
      status: row[5] || "New",
      time: row[4],
      details: {
        item: row[2],
        table: row[3]
      }
    }));

    localStorage.setItem(key, JSON.stringify(converted));
    render();

  }catch(e){
    console.log("Sheet load error:", e);
  }
}

/* =========================
   YOUR ORIGINAL FUNCTIONS (UNCHANGED)
========================= */
function requests(){return JSON.parse(localStorage.getItem(key)||'[]')}
function save(list){localStorage.setItem(key,JSON.stringify(list))}
function menu(){return JSON.parse(localStorage.getItem(menuKey)||'null')||defaultMenu}
function saveMenu(list){localStorage.setItem(menuKey,JSON.stringify(list))}

function enableSound(){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    audioCtx.resume();
    soundEnabled=true;
    document.getElementById('soundNote').innerHTML='<span class="sound-on">Sound is on.</span>';
    document.getElementById('enableSound').textContent='Sound Enabled';
    playAlert();
  }catch(e){
    document.getElementById('soundNote').textContent='Sound error';
  }
}

function playAlert(){
  if(!soundEnabled||!audioCtx)return;
  let now=audioCtx.currentTime;

  [0,0.18,0.36].forEach(offset=>{
    let osc=audioCtx.createOscillator();
    let gain=audioCtx.createGain();

    osc.type='sine';
    osc.frequency.setValueAtTime(880,now+offset);

    gain.gain.setValueAtTime(0.0001,now+offset);
    gain.gain.exponentialRampToValueAtTime(0.2,now+offset+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+offset+0.15);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now+offset);
    osc.stop(now+offset+0.2);
  });
}

function detailText(details){
  return Object.entries(details||{}).map(([k,v])=>k+': '+v).join('\n')
}

function counts(list){
  document.getElementById('newCount').textContent=list.filter(r=>r.status!=='Done').length;
  document.getElementById('waiterCount').textContent=list.filter(r=>r.type==='Call Waiter'&&r.status!=='Done').length;
  document.getElementById('billCount').textContent=list.filter(r=>r.type==='Request Bill'&&r.status!=='Done').length;
  document.getElementById('orderCount').textContent=list.filter(r=>r.type==='Contactless Order'&&r.status!=='Done').length;
}

function ticketHtml(r,flashId){
  return '<article class="ticket '+(r.status==='Done'?'done':'')+' '+(flashId===r.id?'flash new-alert':'')+'">'+
  '<div><p class="eyebrow">'+r.id+'</p><h3>'+r.type+'</h3>'+
  '<div class="meta"><span class="pill">'+r.status+'</span><span class="pill">'+r.time+'</span></div>'+
  '<p class="detail">'+detailText(r.details)+'</p></div>'+
  '<div class="actions">'+
  (r.status==='Done'
    ?'<button data-new="'+r.id+'">Reopen</button>'
    :'<button class="primary" data-done="'+r.id+'">Mark Done</button>'
  )+
  '</div></article>';
}

function render(flashId){
  let list=requests();
  counts(list);

  let active=list.filter(r=>r.status!=='Done'&&(filter.value==='All'||r.type===filter.value));
  let done=list.filter(r=>r.status==='Done'&&(filter.value==='All'||r.type===filter.value));

  board.innerHTML=active.length?active.map(r=>ticketHtml(r,flashId)).join(''):'<div class="empty">No active requests</div>';
  doneBoard.innerHTML=done.length?done.map(r=>ticketHtml(r,flashId)).join(''):'<div class="empty">No done tasks</div>';

  renderManagerMenu();
}

/* =========================
   AUTO SYNC (ADDED)
========================= */
setInterval(loadFromSheet, 5000);
loadFromSheet();

/* =========================
   EVENTS (UNCHANGED)
========================= */
board.addEventListener('click',handleTicketClick);
doneBoard.addEventListener('click',handleTicketClick);

function handleTicketClick(e){
  let done=e.target.closest('[data-done]');
  let open=e.target.closest('[data-new]');
  if(!done&&!open)return;

  let list=requests();
  let id=(done||open).dataset.done||(done||open).dataset.new;
  let item=list.find(r=>r.id===id);

  if(item)item.status=done?'Done':'New';

  save(list);
  render();
}

filter.addEventListener('change',()=>render());
document.getElementById('enableSound').addEventListener('click',enableSound);
document.getElementById('refresh').addEventListener('click',()=>render());

</script>
